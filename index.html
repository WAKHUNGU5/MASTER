<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Entertainment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .hidden {
            display: none !important;
        }
        
        /* Dashboard Styles */
        .dashboard {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .user-info {
            color: #333;
        }
        .user-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .user-info p {
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            width: 120px;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .data-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .data-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .data-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .data-card p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <!-- Login/Register Forms -->
    <div class="container" id="loginContainer">
        <h1>🎬 School Entertainment</h1>
        <p class="subtitle">Umesoma sana? Sasa ni wakati wa kuenjoy kiasi</p>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div class="error" id="loginError"></div>
            <div class="form-group">
                <label for="loginUsername">Username:</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button onclick="handleLogin()">Log In</button>
            <div class="toggle-form">
                Don't have an account? <a onclick="toggleForms()">Create one</a>
            </div>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="error" id="registerError"></div>
            <div class="form-group">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" placeholder="Your email" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" placeholder="Create a password" required>
            </div>
            <button onclick="handleRegister()">Create Account</button>
            <div class="toggle-form">
                Already have an account? <a onclick="toggleForms()">Log in</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard hidden" id="dashboard">
        <div class="dashboard-header">
            <div class="user-info">
                <h2>Welcome, <span id="displayUsername"></span>!</h2>
                <p>Here's your entertainment ground</p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- Movies Section -->
        <div class="category-section">
            <h2 class="category-title">🎥 Popular Movies</h2>
            <div class="data-grid" id="moviesGrid"></div>
        </div>

        <!-- Music Section -->
        <div class="category-section">
            <h2 class="category-title">🎵 Young Tembo Music</h2>
            <div class="data-grid" id="musicGrid"></div>
        </div>

        <!-- Games Section -->
        <div class="category-section">
            <h2 class="category-title">🎮 Popular Games: E-football</h2>
            <div class="data-grid" id="gamesGrid"></div>
        </div>

        <!-- Events Section -->
        <div class="category-section">
            <h2 class="category-title">📅 Upcoming Events</h2>
            <div class="data-grid" id="eventsGrid"></div>
        </div>
    </div>

    <script>
        // Sample data
        const entertainmentData = {
            movies: [
                { title: "The Quantum Quest", desc: "An epic sci-fi adventure about students solving a cosmic mystery." },
                { title: "Laughter Labs", desc: "A hilarious comedy about school life and friendship." },
                { title: "Beat Drop", desc: "A music-driven drama featuring talented students." },
                { title: "Mystery Manor", desc: "An exciting thriller with unexpected twists." }
            ],
            music: [
                { title: "Student Vibes", artist: "Young Tembo", desc: "Mke wangu nimlevi full song." },
                { title: "Digital Dreams", artist: "Young Tembo", desc: "mama niombee song." },
                { title: "Chilled Moments", artist: "Young Tembo", desc: "Are you happy now song." },
                { title: "Remix Reality", artist: "DJ byka 254", desc: "Khuminya finest." }
            ],
            games: [
                { title: "Code Quest", desc: "Learn coding through an interactive adventure game." },
                { title: "Math Battles", desc: "Compete with friends in math challenges." },
                { title: "Brain Puzzles", desc: "Test your logic with engaging puzzle games." },
                { title: "Trivia Champion", desc: "Challenge your knowledge across multiple topics." }
            ],
            events: [
                { title: "Gaming Tournament", date: "May 15, 2024", desc: "School-wide esports competition." },
                { title: "Talent Show", date: "May 22, 2024", desc: "Showcase your talents on stage." },
                { title: "Movie Night", date: "May 29, 2024", desc: "Free screening of latest student-picked film." },
                { title: "Music Festival", date: "June 5, 2024", desc: "Live performances by student bands." }
            ]
        };

        // Sample users (in real app, this would be a backend)
        const users = [
            { username: "student1", password: "pass123", email: "student1@school.edu" },
            { username: "student2", password: "pass456", email: "student2@school.edu" },
            { username: "demo", password: "demo", email: "demo@school.edu" }
        ];

        let currentUser = null;

        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
            clearErrors();
        }

        function clearErrors() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
        }

        function showError(formType, message) {
            const errorEl = document.getElementById(formType === 'login' ? 'loginError' : 'registerError');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('login', 'Please enter both username and password.');
                return;
            }

            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                showDashboard();
            } else {
                showError('login', 'Invalid username or password. Try: demo/demo');
            }
        }

        function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showError('register', 'Please fill in all fields.');
                return;
            }

            if (users.some(u => u.username === username)) {
                showError('register', 'Username already exists. Choose another.');
                return;
            }

            users.push({ username, password, email });
            currentUser = { username, email };
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('displayUsername').textContent = currentUser.username;
            loadData();
        }

        function loadData() {
            loadGrid('moviesGrid', entertainmentData.movies);
            loadGrid('musicGrid', entertainmentData.music);
            loadGrid('gamesGrid', entertainmentData.games);
            loadGrid('eventsGrid', entertainmentData.events);
        }

        function loadGrid(gridId, items) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <p>${item.desc || (item.artist ? 'Artist: ' + item.artist : '')}${item.date ? '<br><strong>Date:</strong> ' + item.date : ''}</p>
                `;
                grid.appendChild(card);
            });
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            clearErrors();
        }

        // Test credentials hint on load
        window.addEventListener('load', () => {
            console.log('Test login - Username: demo, Password: demo');
        });
    </script>
</body>
</html>
