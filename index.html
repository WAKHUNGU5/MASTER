<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Entertainment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .hidden {
            display: none !important;
        }
        
        /* Dashboard Styles */
        .dashboard {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .user-info {
            color: #333;
        }
        .user-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .user-info p {
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            width: 120px;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .data-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .data-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .data-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .data-card p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
        
        /* Video Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #000;
        }
        .video-player {
            width: 100%;
            max-width: 700px;
            height: 400px;
            border-radius: 8px;
            margin: 20px auto;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 16px;
        }
        .error-message {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .guest-login {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .guest-btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .guest-btn:hover {
            transform: translateY(-2px);
        }
        .guest-btn:active {
            transform: translateY(0);
        }
        .or-divider {
            text-align: center;
            color: #999;
            margin: 20px 0 15px 0;
            font-size: 14px;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <!-- Login/Register Forms -->
    <div class="container" id="loginContainer">
        <h1>🎬 School Entertainment</h1>
        <p class="subtitle">Umesoma sana? Sasa ni wakati wa kuenjoy kiasi</p>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div class="error" id="loginError"></div>
            <div class="form-group">
                <label for="loginUsername">Username:</label>
                <input type="text" id="loginUsername" placeholder="Enter any username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter any password" required>
            </div>
            <button onclick="handleLogin()">Log In</button>
            
            <div class="or-divider">— OR —</div>
            
            <button class="guest-btn" onclick="loginAsGuest()">🎭 Continue as Guest</button>
            
            <div class="toggle-form" style="margin-top: 20px;">
                Want to save your data? <a onclick="toggleForms()">Create an account</a>
            </div>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="error" id="registerError"></div>
            <div class="form-group">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" placeholder="Your email" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" placeholder="Create a password" required>
            </div>
            <button onclick="handleRegister()">Create Account</button>
            <div class="toggle-form" style="margin-top: 20px;">
                Already have an account? <a onclick="toggleForms()">Log in</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard hidden" id="dashboard">
        <div class="dashboard-header">
            <div class="user-info">
                <h2>Welcome, <span id="displayUsername"></span>!</h2>
                <p>Here's your entertainment ground</p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- Movies Section -->
        <div class="category-section">
            <h2 class="category-title">🎥 Popular Movies</h2>
            <div class="data-grid" id="moviesGrid"></div>
        </div>

        <!-- Music Section -->
        <div class="category-section">
            <h2 class="category-title">🎵 Trending Music & Young Tembo</h2>
            <div class="data-grid" id="musicGrid"></div>
        </div>

        <!-- Games Section -->
        <div class="category-section">
            <h2 class="category-title">🎮 Popular Games: E-football</h2>
            <div class="data-grid" id="gamesGrid"></div>
        </div>

        <!-- Events Section -->
        <div class="category-section">
            <h2 class="category-title">📅 Upcoming Events</h2>
            <div class="data-grid" id="eventsGrid"></div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideoModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <iframe id="videoFrame" class="video-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <p id="modalDesc"></p>
        </div>
    </div>

    <script>
        // Dynamically set API URL based on environment
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api'
            : 'https://master-seven-wine.vercel.app/api';
        
        let currentUser = null;
        let entertainmentData = {
            movies: [],
            music: [],
            games: [],
            events: []
        };

        // ==================== UI Functions ====================
        
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
            clearErrors();
        }

        function clearErrors() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
        }

        function showError(formType, message) {
            const errorEl = document.getElementById(formType === 'login' ? 'loginError' : 'registerError');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // ==================== API Functions ====================

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('login', 'Please enter both username and password.');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    // If backend is not available or login fails, allow local login
                    console.warn('Backend login failed, allowing local login');
                    currentUser = { username, email: `${username}@school.edu` };
                    showDashboard();
                    return;
                }

                const data = await response.json();
                currentUser = data.user;
                showDashboard();
            } catch (err) {
                // Allow login even if backend is not available
                console.log('Backend connection error, allowing offline login');
                currentUser = { username, email: `${username}@school.edu` };
                showDashboard();
            }
        }

        function loginAsGuest() {
            currentUser = { username: 'Guest', email: 'guest@school.edu' };
            showDashboard();
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showError('register', 'Please fill in all fields.');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('register', error.error || 'Registration failed');
                    return;
                }

                const data = await response.json();
                currentUser = data.user;
                showDashboard();
            } catch (err) {
                // Allow registration even if backend is not available
                console.log('Backend connection error, creating local account');
                currentUser = { username, email };
                showDashboard();
            }
        }

        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/entertainment`);
                if (!response.ok) throw new Error('Failed to load data');
                entertainmentData = await response.json();
                
                loadGrid('moviesGrid', entertainmentData.movies, 'movie');
                loadGrid('musicGrid', entertainmentData.music, 'music');
                loadGrid('gamesGrid', entertainmentData.games, 'game');
                loadGrid('eventsGrid', entertainmentData.events, 'event');
            } catch (err) {
                console.error('Error loading data:', err);
                showErrorMessage('Could not load entertainment data. Make sure backend is running.');
            }
        }

        function loadGrid(gridId, items, type) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            
            if (items.length === 0) {
                grid.innerHTML = '<p>No items available</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'data-card';
                
                let content = `<h3>${item.title}</h3>`;
                
                if (type === 'movie') {
                    content += `<p>${item.desc}</p><p><strong>Genre:</strong> ${item.genre}</p>`;
                    card.onclick = () => openVideoModal(item.title, item.videoId, item.desc);
                } else if (type === 'music') {
                    content += `<p><strong>Artist:</strong> ${item.artist}</p><p>${item.desc}</p><p><strong>Duration:</strong> ${item.duration}</p>`;
                    card.onclick = () => openVideoModal(item.title, item.videoId, item.desc);
                } else if (type === 'game') {
                    content += `<p>${item.desc}</p><p><strong>Category:</strong> ${item.category}</p><p>⭐ ${item.rating}</p>`;
                } else if (type === 'event') {
                    content += `<p>${item.desc}</p><p><strong>Date:</strong> ${item.date}</p><p><strong>Time:</strong> ${item.time}</p><p><strong>Location:</strong> ${item.location}</p>`;
                }
                
                card.innerHTML = content;
                grid.appendChild(card);
            });
        }

        function openVideoModal(title, videoId, desc) {
            if (!videoId) return;
            
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').textContent = desc;
            
            // Embed YouTube video
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            document.getElementById('videoFrame').src = embedUrl;
            
            document.getElementById('videoModal').style.display = 'block';
        }

        function closeVideoModal() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
        }

        function showErrorMessage(message) {
            const container = document.getElementById('loginContainer');
            if (!document.getElementById('errorAlert')) {
                const errorDiv = document.createElement('div');
                errorDiv.id = 'errorAlert';
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                container.insertBefore(errorDiv, container.firstChild);
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('displayUsername').textContent = currentUser.username;
            loadData();
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            clearErrors();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('videoModal');
            if (event.target == modal) {
                closeVideoModal();
            }
        }

        // Test credentials hint on load
        window.addEventListener('load', () => {
            console.log('🎬 School Entertainment System');
            console.log('📝 Test Credentials:');
            console.log('   Username: demo');
            console.log('   Password: demo');
            console.log('🔌 Make sure backend is running: npm start');
        });
    </script>
</body>
</html>
